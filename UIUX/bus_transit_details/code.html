            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

            backdrop-filter: blur(40px);

            border: 1px solid rgba(255, 255, 255, 0.4);

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen relative overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar (From JSON) -->
<header class="fixed top-0 left-0 w-full z-50 bg-white/40 dark:bg-black/40 backdrop-blur-xl border-b border-white/20 dark:border-white/10 shadow-sm flex justify-between items-center px-container-padding py-stack-sm w-full">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-headline-md">arrow_back</span>
</button>
<div class="font-headline-lg text-headline-lg font-bold tracking-tighter text-primary dark:text-primary-fixed-dim">
            NAVI
        </div>
<button class="text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity p-2 -mr-2 rounded-full active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-headline-md">sensors</span>
</button>
</header>
<!-- Main Content Canvas -->

<!-- Map Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-b from-surface/20 via-surface/40 to-surface"></div>
<!-- Live Bus Marker (Abstract) -->
<div class="absolute top-[40%] left-[55%] -translate-x-1/2 -translate-y-1/2 flex flex-col items-center animate-pulse">
<div class="bg-primary text-white p-2 rounded-full shadow-[0_0_20px_rgba(0,105,111,0.5)] border-2 border-white relative z-10">
<span class="material-symbols-outlined icon-fill">directions_bus</span>
</div>
<div class="w-1 h-8 bg-primary/80 mt-1 rounded-full"></div>
<div class="w-16 h-4 bg-primary/20 rounded-[100%] mt-1 blur-sm shadow-[0_0_15px_rgba(0,219,231,0.6)]"></div>
</div>
</div>
<!-- Content Container -->
<div class="relative z-10 px-margin-mobile md:px-margin-desktop mt-[35vh] flex-grow flex flex-col gap-stack-lg max-w-3xl mx-auto w-full">
<!-- Primary Bus Details Card -->
<div class="glass-panel-heavy glow-edge rounded-3xl p-container-padding shadow-[0_12px_40px_-12px_rgba(0,0,0,0.1)]">
<div class="flex justify-between items-start mb-stack-md">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="bg-primary-container text-on-primary-container font-label-caps text-label-caps px-3 py-1 rounded-full">LIVE</span>
<span class="font-body-sm text-on-surface-variant">Central Transit</span>
</div>
<h1 class="font-display-xl text-display-xl text-on-surface mb-1">Bus 402</h1>
<p class="font-body-lg text-body-lg text-outline">To Downtown Hub</p>
</div>
<div class="text-right">
<div class="font-display-xl text-display-xl text-primary drop-shadow-[0_0_12px_rgba(0,219,231,0.3)]">4</div>
<div class="font-label-caps text-label-caps text-on-surface-variant">MINS AWAY</div>
</div>
</div>

</div>
</div>
</div>

<span class="material-symbols-outlined text-primary">route</span>

<div class="relative pl-6">

<div class="absolute left-2.5 top-2 bottom-6 w-px bg-outline-variant/50"></div>

<div class="relative mb-stack-md last:mb-0">

</div>
<div class="font-data-point text-data-point text-primary bg-primary-container/30 px-2 py-1 rounded">
                                10:42 AM
                            </div>
</div>
</div>
<!-- Stop 2 -->
<div class="relative mb-stack-md last:mb-0">
<div class="absolute -left-[25px] top-1.5 w-3 h-3 rounded-full bg-surface border-2 border-outline-variant z-10"></div>
<div class="flex justify-between items-start opacity-70">
<div>
<div class="font-body-md text-body-md text-on-surface">Pine &amp; 8th St</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">1.5 mi away</div>
</div>
<div class="font-data-point text-data-point text-on-surface-variant">
                                10:48 AM
                            </div>
</div>
</div>
<!-- Stop 3 -->
<div class="relative mb-0">
<div class="absolute -left-[25px] top-1.5 w-3 h-3 rounded-full bg-surface border-2 border-outline-variant z-10"></div>
<div class="flex justify-between items-start opacity-50">
<div>
<div class="font-body-md text-body-md text-on-surface">Downtown Hub</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Terminal</div>
</div>
<div class="font-data-point text-data-point text-on-surface-variant">
